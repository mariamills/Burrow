<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{if .Title}}{{.Title}} — {{end}}Burrow</title>
    <link rel="stylesheet" href="/ui/static/css/style.css">
    <script src="/ui/static/js/htmx.min.js"></script>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <a href="/" class="logo">Burrow</a>
            <nav>
                <a href="/ui/dashboard" {{if eq .Active "dashboard"}}class="active"{{end}}>
                    <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="2" width="7" height="7" rx="1.5"/><rect x="11" y="2" width="7" height="7" rx="1.5"/><rect x="2" y="11" width="7" height="7" rx="1.5"/><rect x="11" y="11" width="7" height="7" rx="1.5"/></svg>
                    Dashboard
                </a>
                <a href="/ui/secrets" {{if eq .Active "secrets"}}class="active"{{end}}>
                    <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="9" width="14" height="9" rx="1.5"/><path d="M6 9V6a4 4 0 0 1 8 0v3"/></svg>
                    Secrets
                </a>
                <a href="/ui/tokens" {{if eq .Active "tokens"}}class="active"{{end}}>
                    <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15 2l-1.5 1.5m-5.11 5.11a4 4 0 1 1-5.66 5.66 4 4 0 0 1 5.66-5.66zm0 0L11.5 5.5m0 0l2 2L16 5l-2-2m-2.5 2.5L14 3"/></svg>
                    Tokens
                </a>
                <a href="/ui/users" {{if eq .Active "users"}}class="active"{{end}}>
                    <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="6" r="3.5"/><path d="M3 18v-1.5a5 5 0 0 1 14 0V18"/></svg>
                    Users
                </a>
                <a href="/ui/groups" {{if eq .Active "groups"}}class="active"{{end}}>
                    <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 18v-1a3.5 3.5 0 0 0-3.5-3.5h-4A3.5 3.5 0 0 0 3 17v1"/><circle cx="8.5" cy="6" r="3"/><path d="M17 18v-1a3 3 0 0 0-2-2.83"/><path d="M13 3.17a3 3 0 0 1 0 5.66"/></svg>
                    Groups
                </a>
                <a href="/ui/roles" {{if eq .Active "roles"}}class="active"{{end}}>
                    <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10 2l2 4h4l-3 3 1 4-4-2-4 2 1-4-3-3h4z"/></svg>
                    Roles
                </a>
                <a href="/ui/audit" {{if eq .Active "audit"}}class="active"{{end}}>
                    <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2H5a1.5 1.5 0 0 0-1.5 1.5v13A1.5 1.5 0 0 0 5 18h10a1.5 1.5 0 0 0 1.5-1.5V7z"/><polyline points="12 2 12 7 16.5 7"/><line x1="13" y1="11" x2="7" y2="11"/><line x1="13" y1="14" x2="7" y2="14"/></svg>
                    Audit Log
                </a>
                <a href="/ui/settings" {{if eq .Active "settings"}}class="active"{{end}}>
                    <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="2.5"/><path d="M16.2 12.2a1.2 1.2 0 0 0 .24 1.32l.04.04a1.44 1.44 0 1 1-2.04 2.04l-.04-.04a1.2 1.2 0 0 0-1.32-.24 1.2 1.2 0 0 0-.72 1.1v.12a1.44 1.44 0 1 1-2.88 0v-.06a1.2 1.2 0 0 0-.78-1.1 1.2 1.2 0 0 0-1.32.24l-.04.04a1.44 1.44 0 1 1-2.04-2.04l.04-.04a1.2 1.2 0 0 0 .24-1.32 1.2 1.2 0 0 0-1.1-.72h-.12a1.44 1.44 0 1 1 0-2.88h.06a1.2 1.2 0 0 0 1.1-.78 1.2 1.2 0 0 0-.24-1.32l-.04-.04a1.44 1.44 0 1 1 2.04-2.04l.04.04a1.2 1.2 0 0 0 1.32.24h.06a1.2 1.2 0 0 0 .72-1.1v-.12a1.44 1.44 0 0 1 2.88 0v.06a1.2 1.2 0 0 0 .72 1.1 1.2 1.2 0 0 0 1.32-.24l.04-.04a1.44 1.44 0 1 1 2.04 2.04l-.04.04a1.2 1.2 0 0 0-.24 1.32v.06a1.2 1.2 0 0 0 1.1.72h.12a1.44 1.44 0 0 1 0 2.88h-.06a1.2 1.2 0 0 0-1.1.72z"/></svg>
                    Settings
                </a>
                <div class="sidebar-divider"></div>
                <form method="POST" action="/ui/logout" class="sidebar-logout">
                    <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
                    <button type="submit" class="sidebar-logout-btn">Sign Out</button>
                </form>
            </nav>
        </aside>
        <main class="main">
            {{template "content" .}}
        </main>
    </div>
    <div id="toast"></div>
    <script src="/ui/static/js/app.js"></script>
</body>
</html>
