<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Burrow</title>
    <link rel="stylesheet" href="/ui/static/css/style.css">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-header">
                <a href="/" class="login-logo">Burrow</a>
                <p class="login-subtitle">Sign in to your vault</p>
            </div>
            {{if .Error}}<p class="login-error">{{.Error}}</p>{{end}}
            <form method="POST" action="/ui/login">
                <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required autofocus placeholder="you@company.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Your password">
                </div>
                <button type="submit" class="btn btn-primary login-btn">Sign In</button>
            </form>
            <p class="login-footer">Or use a Bearer token via the <a href="/">API</a></p>
        </div>
    </div>
</body>
</html>
